stages:
  - lint
  - security
  - test
  - sync

# ─────────────────────────────────────────────────────────────
# Base: UBI 10 Python 3.12
# ─────────────────────────────────────────────────────────────

default:
  image: registry.access.redhat.com/ubi10:latest
  tags:
    - do.small
  before_script:
    - dnf install -y python3.12 python3.12-pip && dnf clean all

# ─────────────────────────────────────────────────────────────
# Test — runs on every push
# ─────────────────────────────────────────────────────────────

test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  before_script:
    - dnf install -y python3.12 python3.12-pip && dnf clean all
    - pip3.12 install --no-cache-dir -r requirements.txt
  script:
    - python3.12 -m pytest test_converter.py -v

# ─────────────────────────────────────────────────────────────
# Lint & Format — disabled
# ─────────────────────────────────────────────────────────────

lint:
  stage: lint
  rules:
    - when: never
    - if: $CI_PIPELINE_SOURCE == "push"
  before_script:
    - dnf install -y python3.12 python3.12-pip && dnf clean all
    - pip3.12 install --no-cache-dir ruff mypy
    - pip3.12 install --no-cache-dir -r requirements.txt
  script:
    - ruff check .
    - ruff format --check .
    - mypy --ignore-missing-imports .

# ─────────────────────────────────────────────────────────────
# Security — disabled
# ─────────────────────────────────────────────────────────────

bandit:
  stage: security
  rules:
    - when: never
    - if: $CI_PIPELINE_SOURCE == "push"
  before_script:
    - dnf install -y python3.12 python3.12-pip && dnf clean all
    - pip3.12 install --no-cache-dir bandit
  script:
    - bandit -r . -x ./venv,./.venv -ll

safety:
  stage: security
  rules:
    - when: never
    - if: $CI_PIPELINE_SOURCE == "push"
  before_script:
    - dnf install -y python3.12 python3.12-pip && dnf clean all
    - pip3.12 install --no-cache-dir safety
  script:
    - safety check -r requirements.txt
  allow_failure: true

# ─────────────────────────────────────────────────────────────
# Sync — manual trigger only
# ─────────────────────────────────────────────────────────────

confluence-sync:
  stage: sync
  environment: confluence-sync
  rules:
    - when: manual
  before_script:
    - dnf install -y python3.12 python3.12-pip git openssh-clients && dnf clean all
    - pip3.12 install --no-cache-dir -r requirements.txt
    # Set up SSH key for pushing to the knowledge base repo
    - mkdir -p ~/.ssh
    - echo "$KB_GIT_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -t rsa "$KB_GIT_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - python3.12 sync.py
  variables:
    # These are pulled from the GitLab environment "confluence-sync"
    # Configure them under Settings → CI/CD → Variables (scoped to the environment)
    #
    # Variables (not masked):
    #   CONFLUENCE_URL          - e.g., https://wiki.mycompany.com
    #   CONFLUENCE_SPACE_KEY    - e.g., ENG,PRODUCT,OPS
    #   KB_GIT_REPO_URL         - e.g., git@gitlab.mycompany.com:your-org/knowledge-base.git
    #   KB_GIT_BRANCH           - e.g., master
    #   KB_GIT_AUTHOR_NAME      - e.g., confluence-sync
    #   KB_GIT_AUTHOR_EMAIL     - e.g., confluence-sync@mycompany.com
    #   KB_GIT_HOST             - e.g., gitlab.mycompany.com (for ssh-keyscan)
    #   OUTPUT_DIR              - e.g., ./knowledge-base
    #
    # Masked/Protected variables:
    #   CONFLUENCE_PAT          - Confluence Personal Access Token
    #   KB_GIT_SSH_PRIVATE_KEY  - SSH private key (File type recommended)
    #
    # KB_GIT_SSH_KEY is set to the path where we write the key in before_script
    KB_GIT_SSH_KEY: ~/.ssh/id_rsa
